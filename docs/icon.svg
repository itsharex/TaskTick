<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c8aff"/>
      <stop offset="50%" stop-color="#8b7cf7"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4a5adb" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- Clock body - cute cartoon style -->
  <circle cx="256" cy="248" r="155" fill="white" opacity="0.95" filter="url(#shadow)"/>
  <circle cx="256" cy="248" r="145" fill="white"/>

  <!-- Clock face decorative ring -->
  <circle cx="256" cy="248" r="138" fill="none" stroke="#e8e8f4" stroke-width="3"/>

  <!-- Hour markers - dots -->
  <circle cx="256" cy="118" r="8" fill="#6c8aff"/><!-- 12 -->
  <circle cx="326" cy="132" r="6" fill="#c4c4dd"/><!-- 1 -->
  <circle cx="374" cy="178" r="6" fill="#c4c4dd"/><!-- 2 -->
  <circle cx="390" cy="248" r="8" fill="#8b7cf7"/><!-- 3 -->
  <circle cx="374" cy="318" r="6" fill="#c4c4dd"/><!-- 4 -->
  <circle cx="326" cy="364" r="6" fill="#c4c4dd"/><!-- 5 -->
  <circle cx="256" cy="378" r="8" fill="#a78bfa"/><!-- 6 -->
  <circle cx="186" cy="364" r="6" fill="#c4c4dd"/><!-- 7 -->
  <circle cx="138" cy="318" r="6" fill="#c4c4dd"/><!-- 8 -->
  <circle cx="122" cy="248" r="8" fill="#6c8aff"/><!-- 9 -->
  <circle cx="138" cy="178" r="6" fill="#c4c4dd"/><!-- 10 -->
  <circle cx="186" cy="132" r="6" fill="#c4c4dd"/><!-- 11 -->

  <!-- Hour hand -->
  <line x1="256" y1="248" x2="256" y2="170" stroke="#3a3a5c" stroke-width="10" stroke-linecap="round"/>

  <!-- Minute hand -->
  <line x1="256" y1="248" x2="330" y2="200" stroke="#6c8aff" stroke-width="7" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="256" cy="248" r="12" fill="#6c8aff"/>
  <circle cx="256" cy="248" r="6" fill="white"/>

  <!-- Checkmark badge -->
  <circle cx="370" cy="370" r="62" fill="#22c55e" filter="url(#glow)"/>
  <circle cx="370" cy="370" r="55" fill="#22c55e"/>
  <polyline points="345,370 362,387 395,354" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cute sparkles -->
  <g fill="#fbbf24" opacity="0.9">
    <polygon points="130,100 134,112 146,112 136,120 140,132 130,124 120,132 124,120 114,112 126,112" transform="scale(0.7) translate(60,50)"/>
    <polygon points="130,100 134,112 146,112 136,120 140,132 130,124 120,132 124,120 114,112 126,112" transform="scale(0.5) translate(680,80)"/>
  </g>
</svg>
